[build]
builder = "DOCKERFILE"
dockerfilePath = "./api/Dockerfile"
watchPatterns = ["api/**"]

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/stats/summary"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
