services:
  db:
    image: postgres:16-alpine
    container_name: elec_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elec}
      POSTGRES_USER: ${POSTGRES_USER:-elec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./${CSV_FILE:-TCPD_AE_Tamil_Nadu_2026-4-12.csv}:/data/tcpd_ae.csv
      - ./rough/TCPD_AE_All_States_2026-4-20.csv:/data/tcpd_ae_all.csv
      - ./rough/TCPD_GE_All_States_2026-4-20.csv:/data/tcpd_ge_all.csv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elec} -d ${POSTGRES_DB:-elec}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elec_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: elec_api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-72}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-elec-auth}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:?Set FIREBASE_API_KEY in .env}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      RAZORPAY_PLAN_ID_PRO: ${RAZORPAY_PLAN_ID_PRO:-}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  jupyter:
    build: ./datascience
    container_name: elec_jupyter
    profiles:
      - dev
    ports:
      - "8888:8888"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-change_me}
    volumes:
      - ./datascience/notebooks:/app/notebooks
      - ./datascience/output:/app/output
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-dev}
    container_name: elec_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:?Set VITE_FIREBASE_API_KEY in .env}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:?Set VITE_FIREBASE_AUTH_DOMAIN in .env}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:?Set VITE_FIREBASE_PROJECT_ID in .env}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    depends_on:
      - api

  # Production: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: elec_nginx
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
