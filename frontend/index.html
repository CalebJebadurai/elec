<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive analysis of Indian Assembly and General Elections. Explore constituency swing history, party trends, vote share data, and election predictions." />
    <title>Election Swings &amp; Trends</title>
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else if (!t && !window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.remove('dark');
      })();
    </script>
    <script defer data-domain="%VITE_PLAUSIBLE_DOMAIN%" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
