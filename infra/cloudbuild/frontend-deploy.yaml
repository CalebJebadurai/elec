# Cloud Build: Build frontend and deploy to Cloud Storage + CDN
# Triggered on push to main branch (frontend/ changes)

steps:
  # Install dependencies
  - name: "oven/bun:1-alpine"
    dir: "frontend"
    args: ["bun", "install", "--frozen-lockfile"]

  # Build production bundle
  - name: "oven/bun:1-alpine"
    dir: "frontend"
    args: ["bun", "run", "build"]
    env:
      - "VITE_API_URL=/api"
      - "VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "VITE_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "VITE_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}"

  # Upload to Cloud Storage (with cache headers)
  - name: "gcr.io/cloud-builders/gsutil"
    args:
      - "-m"                   # Parallel upload
      - "-h"
      - "Cache-Control:public,max-age=31536000,immutable"
      - "cp"
      - "-r"
      - "frontend/dist/assets/*"
      - "gs://${PROJECT_ID}-frontend/assets/"

  # Upload HTML (short cache — picks up new asset hashes)
  - name: "gcr.io/cloud-builders/gsutil"
    args:
      - "-h"
      - "Cache-Control:public,max-age=300"
      - "cp"
      - "frontend/dist/index.html"
      - "gs://${PROJECT_ID}-frontend/"

  # Upload remaining files (favicon, etc.)
  - name: "gcr.io/cloud-builders/gsutil"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gsutil -m -h "Cache-Control:public,max-age=3600" \
          rsync -r -x "assets/|index.html" \
          frontend/dist/ gs://${PROJECT_ID}-frontend/

  # Invalidate CDN cache for index.html
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "compute"
      - "url-maps"
      - "invalidate-cdn-cache"
      - "elec-url-map"
      - "--path=/index.html"

substitutions:
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _GOOGLE_CLIENT_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY
